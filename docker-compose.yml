version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - room-server

  room-server:
    build:
      context: .
      dockerfile: apps/room-server/Dockerfile
    env_file:
      - .env
    ports:
      - "8787:8787"

